name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: fastapi
        run: uv sync --all-groups

      - name: Run ruff
        working-directory: fastapi
        run: uv run ruff check .

      - name: Run mypy
        working-directory: fastapi
        run: uv run mypy app/

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: loyalty_test
          POSTGRES_USER: loyaltyhub
          POSTGRES_PASSWORD: loyaltyhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U loyaltyhub -d loyalty_test"
          --health-interval 5s --health-timeout 5s --health-retries 5

    env:
      POSTGRES_USER: loyaltyhub
      POSTGRES_PASSWORD: loyaltyhub
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: loyaltyhub
      SECRET_KEY: ci-secret-key
      TEST_DATABASE_URL: postgresql+asyncpg://loyaltyhub:loyaltyhub@localhost:5432/loyalty_test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: fastapi
        run: uv sync --all-groups

      - name: Run tests
        working-directory: fastapi
        run: uv run pytest tests/ -v
